<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Results</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
        }

        /* Container Styles */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: center;
        }

        /* Header */
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* Score Display */
        .score {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .score span {
            font-weight: bold;
            color: #27ae60;
        }

        /* Button Styles */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 200px;
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        button:active {
            background-color: #1d6fa5;
            transform: translateY(1px);
        }

        button:focus {
            outline: none;
        }

        /* Feedback Section */
        .feedback {
            margin-top: 20px;
        }

        .feedback h3 {
            margin: 10px 0 5px;
            font-size: 1.1rem;
            color: #34495e;
        }

        .feedback p {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .correct {
            color: #27ae60;
            font-weight: bold;
        }

        .incorrect {
            color: #e74c3c;
            font-weight: bold;
        }

        /* Divider */
        .feedback hr {
            border: 0;
            height: 1px;
            background: #ddd;
            margin: 15px 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            button {
                font-size: 0.9rem;
                padding: 10px 20px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Results</h1>
        <div class="score">
            Your Score: <span id="score"></span>/10
        </div>

        <div class="button-container">
            <button onclick="viewFeedback()">View Feedback</button>
            <button onclick="goToDashboard()">Go to Dashboard</button>
        </div>

        <div id="feedback" class="feedback" style="display: none;"></div>
    </div>

    <script>
        // Retrieve data from localStorage
        const score = localStorage.getItem("score") || "0";
        const userAnswers = JSON.parse(localStorage.getItem("userAnswers")) || {};
        const correctAnswers = JSON.parse(localStorage.getItem("correctAnswers")) || {};
        const questions = JSON.parse(localStorage.getItem("questions")) || {};

        // Display score
        document.getElementById("score").textContent = score;

        // Display feedback
        function viewFeedback() {
            const feedbackDiv = document.getElementById("feedback");
            feedbackDiv.innerHTML = ""; // Clear previous feedback
            for (let questionKey in correctAnswers) {
                const questionText = questions[questionKey] || "Question text not available";
                const userAnswer = userAnswers[questionKey];
                const correctAnswer = correctAnswers[questionKey];
                const result = userAnswer === correctAnswer
                    ? `<span class="correct">Correct!</span>`
                    : `<span class="incorrect">Incorrect!</span>`;
                
                feedbackDiv.innerHTML += `    
                    <h3>Question: ${questionText}</h3>
                    <p>Your Answer: ${userAnswer || "No Answer"}</p>
                    <p>Correct Answer: ${correctAnswer}</p>
                    <p>${result}</p>
                    <hr>
                `;
            }
            feedbackDiv.style.display = "block";  
        }

        // Redirect to the Dashboard
        function goToDashboard() {
            // Change the URL below to the correct path for your dashboard page
            window.location.href = "dashboard.html"; // Example URL, replace with actual dashboard URL
        }
    </script>
</body>
</html>
